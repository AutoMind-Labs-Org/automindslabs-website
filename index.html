<!DOCTYPE html>
<!-- =====================================================
     index.html
     Main HTML structure — all text is populated
     dynamically from js/content.js via script.js.
     ===================================================== -->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title is set dynamically from js/content.js → meta.title -->
    <title></title>

    <!-- SEO description — update this directly in index.html -->
    <meta name="description"
        content="Greece-based AI engineering agency building intelligent, production-ready systems combining Generative AI, machine learning, and scalable cloud infrastructure.">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/automind-labs-logo.ico">

    <!-- Google Fonts: Plus Jakarta Sans (body) + Fragment Mono (accents) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fragment+Mono&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Three.js import map — required for torus.js (ES module) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <!-- Brand — text populated from content.js → nav.brand -->
            <a href="#home" class="logo">
                <img src="images/automind-labs-logo.png" alt="AutoMinds Labs" class="logo-img">
                <span data-content="nav.brand"></span>
            </a>
            <!-- Nav links rendered by script.js from content.js → nav.links -->
            <ul class="nav-links" id="navLinks"></ul>
            <!-- CTA label populated from content.js → nav.cta -->
            <a href="#contact" class="btn btn-primary nav-cta" id="navCta"></a>
            <!-- Hamburger toggle — visible on mobile only -->
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <ul id="mobileLinks"></ul>
            <a href="#contact" class="btn btn-primary mobile-link" id="mobileCta"
                style="margin-top:20px;display:inline-block;"></a>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <section class="hero" id="home">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="container">
            <div class="hero-inner">
                <div class="hero-text fade-up">
                    <h1 data-content="hero.heading"></h1>
                    <p class="hero-sub" data-content="hero.sub"></p>
                    <div class="hero-actions">
                        <a href="#contact" class="btn btn-primary btn-lg" data-content="hero.cta1.label"></a>
                        <a href="#services" class="btn btn-ghost btn-lg" data-content="hero.cta2.label"></a>
                    </div>
                </div>

                <!-- 3D torus canvas — rendered by js/torus.js -->
                <div class="hero-visual fade-up" style="animation-delay:0.2s">
                    <div class="torus-wrap">
                        <canvas id="torus-canvas"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="hero-scroll">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ===== ABOUT ===== -->

    <section class="section" id="about">
        <div class="orb orb-about"></div>
        <div class="container">
            <div class="about-inner">
                <div class="about-text fade-up">
                    <div class="about-eyebrow">
                        <span class="about-eyebrow-line"></span>
                        <span class="about-eyebrow-text" data-content="about.eyebrow"></span>
                    </div>
                    <h2 class="about-heading" data-content="about.heading"></h2>
                    <p class="about-lead" data-content="about.lead"></p>
                    <ul class="about-list"></ul>
                    <a href="#contact" class="btn btn-primary" style="margin-top:36px;"
                        data-content="about.cta.label"></a>
                </div>
                <div class="about-stats"></div>
            </div>
        </div>
        <div class="hero-scroll">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ===== SERVICES ===== -->
    <section class="section section-alt" id="services">
        <div class="orb orb-3"></div>
        <div class="container">
            <div class="section-header fade-up">
                <div class="about-eyebrow eyebrow-center">
                    <span class="about-eyebrow-line"></span>
                    <span class="about-eyebrow-text" data-content="services.eyebrow"></span>
                    <span class="about-eyebrow-line"></span>
                </div>
                <h2 data-content="services.heading"></h2>
                <p data-content="services.sub"></p>
            </div>
            <!-- Service cards rendered by script.js from content.js → services.items -->
            <div class="services-grid"></div>
        </div>
        <div class="hero-scroll">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ===== TECH STACK ===== -->
    <section class="section" id="skills">
        <div class="container">
            <div class="section-header fade-up">
                <div class="about-eyebrow eyebrow-center">
                    <span class="about-eyebrow-line"></span>
                    <span class="about-eyebrow-text" data-content="tech.eyebrow"></span>
                    <span class="about-eyebrow-line"></span>
                </div>
                <h2 data-content="tech.heading"></h2>
                <p data-content="tech.sub"></p>
            </div>
            <!-- Tech cards rendered by script.js from content.js → tech.items -->
            <div class="tech-cards fade-up"></div>
        </div>
        <div class="hero-scroll">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ===== PROCESS ===== -->
    <section class="section section-alt" id="process">
        <div class="orb orb-4"></div>
        <div class="container">
            <div class="section-header fade-up">
                <div class="about-eyebrow eyebrow-center">
                    <span class="about-eyebrow-line"></span>
                    <span class="about-eyebrow-text" data-content="process.eyebrow"></span>
                    <span class="about-eyebrow-line"></span>
                </div>
                <h2 data-content="process.heading"></h2>
                <p data-content="process.sub"></p>
            </div>
            <!-- Process step cards rendered by script.js from content.js → process.steps -->
            <div class="process-steps"></div>
        </div>
        <div class="hero-scroll">
            <span>Scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- ===== CONTACT ===== -->
    <section class="section" id="contact">
        <div class="orb orb-5"></div>
        <div class="container">
            <div class="section-header fade-up">
                <div class="about-eyebrow eyebrow-center">
                    <span class="about-eyebrow-line"></span>
                    <span class="about-eyebrow-text" data-content="contact.eyebrow"></span>
                    <span class="about-eyebrow-line"></span>
                </div>
                <h2 data-content="contact.heading"></h2>
                <p data-content="contact.sub"></p>
            </div>
            <div class="contact-inner">
                <!-- Info cards rendered by script.js from content.js → contact.info -->
                <div class="contact-info-stack fade-up"></div>
                <form class="contact-form fade-up" id="contactForm" style="animation-delay:0.15s">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name" data-content="contact.form.nameLabel"></label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email" data-content="contact.form.emailLabel"></label>
                            <input type="email" id="email" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="project" data-content="contact.form.projectLabel"></label>
                        <input type="text" id="project">
                    </div>
                    <div class="form-group">
                        <label for="message" data-content="contact.form.messageLabel"></label>
                        <textarea id="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg btn-full"
                        data-content="contact.form.submit"></button>
                </form>
            </div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <div class="container">
            <div class="footer-top">
                <div class="footer-brand">
                    <a href="#home" class="logo">
                        <img src="images/automind-labs-logo.png" alt="AutoMinds Labs" class="logo-img">
                        <span data-content="nav.brand"></span>
                    </a>
                    <p data-content="footer.brandDesc"></p>
                </div>
                <!-- Footer link columns rendered by script.js from content.js → footer.columns -->
                <div class="footer-links" id="footerLinks"></div>
            </div>
            <div class="footer-bottom">
                <span data-content="footer.copyright"></span>
            </div>
        </div>
    </footer>

    <!-- EmailJS SDK — used by script.js to send contact form emails -->
    <!-- Public key is safe to expose; restrict domains in EmailJS dashboard → Security -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init('7IVv9Hf-BOV1o8bKk');</script>

    <!-- Content config — must load before script.js -->
    <script src="js/content.js"></script>

    <!-- Main script — populates content, handles nav, scroll animations, form -->
    <script src="js/script.js"></script>

    <!-- 3D torus animation — ES module, uses Three.js via import map -->
    <script type="module" src="js/torus.js"></script>
</body>

</html>
